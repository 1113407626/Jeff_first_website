<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 鹦鹉成本核算系统</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+SC:wght@400;700&display=swap');
    @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
      font-family: 'Noto Sans SC', sans-serif;
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* 导航 */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 15px;
      border: 2px solid #00ffff;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 1.5em;
      font-weight: 900;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
    }

    .nav-links a {
      color: #00ffff;
      text-decoration: none;
      margin-left: 20px;
      padding: 10px 20px;
      border: 2px solid #00ffff;
      border-radius: 25px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      background: #00ffff;
      color: #000;
    }

    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #00ffff;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
    }

    .stat-card.profit { border-color: #00ff00; }
    .stat-card.loss { border-color: #ff0000; }

    .stat-card .number {
      font-size: 2em;
      font-weight: 900;
      margin: 10px 0;
    }

    .stat-card.profit .number { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
    .stat-card.loss .number { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
    .stat-card .number.cyan { color: #00ffff; text-shadow: 0 0 10px #00ffff; }

    .stat-card .label {
      color: #aaa;
      font-size: 0.9em;
    }

    /* 鹦鹉列表 */
    .parrots-section {
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #00ffff;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 1.5em;
      color: #00ffff;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .parrot-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr;
      gap: 15px;
      padding: 15px;
      background: rgba(0, 255, 255, 0.05);
      border-radius: 10px;
      margin-bottom: 10px;
      align-items: center;
    }

    .parrot-row.header {
      background: rgba(0, 255, 255, 0.1);
      font-weight: 700;
      color: #00ffff;
    }

    .parrot-name {
      font-weight: 700;
      color: #fff;
    }

    .cost-input {
      width: 100%;
      padding: 8px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #00ffff;
      border-radius: 5px;
      color: #fff;
      text-align: right;
    }

    .cost-input:focus {
      outline: none;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    .status-select {
      width: 100%;
      padding: 8px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #00ffff;
      border-radius: 5px;
      color: #fff;
      cursor: pointer;
    }

    .status-select option {
      background: #1a1a2e;
      color: #fff;
    }

    .total-cost {
      font-weight: 700;
      color: #ff00ff;
      text-align: right;
    }

    .min-price {
      font-weight: 700;
      color: #00ff00;
      text-align: right;
    }

    .sale-input {
      width: 100%;
      padding: 8px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #00ff00;
      border-radius: 5px;
      color: #00ff00;
      text-align: right;
    }

    .profit-loss {
      font-weight: 700;
      text-align: right;
    }

    .profit-loss.profit { color: #00ff00; }
    .profit-loss.loss { color: #ff0000; }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.3s;
    }

    .btn-primary {
      background: linear-gradient(45deg, #00ffff, #0088ff);
      color: #fff;
    }

    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }

    .btn-save {
      background: linear-gradient(45deg, #00ff00, #00aa00);
      color: #000;
      margin-top: 15px;
      width: 100%;
      padding: 15px;
    }

    .btn-save:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
    }

    /* 固定成本设置 */
    .fixed-costs {
      background: rgba(255, 165, 0, 0.1);
      border: 2px solid orange;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .fixed-costs .section-title {
      color: orange;
    }

    .fixed-cost-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .fixed-cost-item {
      background: rgba(0, 0, 0, 0.5);
      padding: 15px;
      border-radius: 10px;
    }

    .fixed-cost-item label {
      display: block;
      color: #aaa;
      margin-bottom: 5px;
      font-size: 0.9em;
    }

    .fixed-cost-item input {
      width: 100%;
      padding: 8px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid orange;
      border-radius: 5px;
      color: #fff;
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 50px;
      color: #aaa;
    }

    .loading i {
      font-size: 3em;
      color: #00ffff;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 响应式 */
    @media (max-width: 1024px) {
      .parrot-row {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 768px) {
      .parrot-row {
        grid-template-columns: 1fr;
      }
      
      .navbar {
        flex-direction: column;
        gap: 15px;
      }
      
      .nav-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
    }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
    }

    .toast {
      min-width: 300px;
      padding: 15px 20px;
      margin-bottom: 10px;
      border-radius: 10px;
      color: #fff;
      font-weight: 700;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }

    .toast.success { background: linear-gradient(45deg, rgba(0, 255, 0, 0.8), rgba(0, 200, 0, 0.8)); border: 2px solid #00ff00; }
    .toast.error { background: linear-gradient(45deg, rgba(255, 0, 0, 0.8), rgba(200, 0, 0, 0.8)); border: 2px solid #ff0000; }
    .toast.info { background: linear-gradient(45deg, rgba(0, 255, 255, 0.8), rgba(0, 200, 255, 0.8)); border: 2px solid #00ffff; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 导航 -->
    <nav class="navbar">
      <div class="logo">💰 鹦鹉成本核算系统</div>
      <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> 返回首页</a>
        <a href="#" onclick="location.reload()"><i class="fas fa-sync"></i> 刷新</a>
      </div>
    </nav>

    <!-- 总体统计 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">📊 总成本</div>
        <div class="number cyan" id="total-cost">¥0</div>
        <div class="label">所有鹦鹉累计投入</div>
      </div>
      <div class="stat-card">
        <div class="label">💵 已销售金额</div>
        <div class="number cyan" id="total-sold">¥0</div>
        <div class="label">已回笼资金</div>
      </div>
      <div class="stat-card" id="profit-card">
        <div class="label">📈 盈亏状况</div>
        <div class="number" id="profit-loss">¥0</div>
        <div class="label" id="profit-label">未开始销售</div>
      </div>
      <div class="stat-card">
        <div class="label">🦜 待销售鹦鹉</div>
        <div class="number cyan" id="pending-count">0</div>
        <div class="label">需要计算最低价</div>
      </div>
    </div>

    <!-- 固定成本设置 -->
    <div class="fixed-costs">
      <h2 class="section-title">
        <i class="fas fa-cog"></i> 固定成本参数
      </h2>
      <div class="fixed-cost-grid">
        <div class="fixed-cost-item">
          <label>🔥 保温箱价格 (元)</label>
          <input type="number" id="brooder-price" value="300" onchange="saveFixedCosts()">
        </div>
        <div class="fixed-cost-item">
          <label>📅 保温箱摊销 (月)</label>
          <input type="number" id="brooder-months" value="24" onchange="saveFixedCosts()">
        </div>
        <div class="fixed-cost-item">
          <label>🥚 孵化器价格 (元)</label>
          <input type="number" id="incubator-price" value="500" onchange="saveFixedCosts()">
        </div>
        <div class="fixed-cost-item">
          <label>📅 孵化器摊销 (月)</label>
          <input type="number" id="incubator-months" value="24" onchange="saveFixedCosts()">
        </div>
      </div>
    </div>

    <!-- 鹦鹉成本列表 -->
    <div class="parrots-section">
      <h2 class="section-title">
        <i class="fas fa-feather"></i> 鹦鹉成本明细
      </h2>
      
      <div id="parrots-list">
        <div class="loading">
          <i class="fas fa-spinner"></i>
          <p>正在加载数据...</p>
        </div>
      </div>

      <button class="btn btn-save" onclick="saveAllCosts()">
        <i class="fas fa-save"></i> 保存所有修改
      </button>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Supabase 配置
    const SUPABASE_URL = 'https://nxiwatmgedlvzlxmgyhw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54aXdhdG1nZWRsdnpseG1neWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTI2NDgsImV4cCI6MjA4ODA2ODY0OH0.5VBRX8bZkrUiw1DL5Y9bpkMtC-0RVdaoFLEdqWXS2c4';

    let supabase = null;
    let parrots = [];
    let costs = [];

    // 初始化
    try {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      loadData();
    } catch (e) {
      console.error('Supabase 初始化失败:', e);
      showToast('❌ 数据库连接失败', 'error');
    }

    // Toast 提示
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'info-circle';
      toast.innerHTML = `<i class="fas fa-${icon}"></i><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideOutRight 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // 加载数据
    async function loadData() {
      // 加载鹦鹉
      const { data: parrotsData, error: parrotsError } = await supabase
        .from('parrots')
        .select('*')
        .order('created_at', { ascending: false });

      if (parrotsError) {
        console.error('加载鹦鹉失败:', parrotsError);
        showToast('❌ 加载鹦鹉数据失败', 'error');
        return;
      }

      parrots = parrotsData || [];

      // 加载成本
      const { data: costsData, error: costsError } = await supabase
        .from('parrot_costs')
        .select('*');

      if (costsError) {
        console.error('加载成本失败:', costsError);
        showToast('❌ 加载成本数据失败', 'error');
        return;
      }

      costs = costsData || [];

      // 加载固定成本参数（从第一条记录获取）
      if (costs.length > 0) {
        const firstCost = costs[0];
        document.getElementById('brooder-price').value = firstCost.brooder_price || 300;
        document.getElementById('brooder-months').value = firstCost.brooder_months || 24;
        document.getElementById('incubator-price').value = firstCost.incubator_price || 500;
        document.getElementById('incubator-months').value = firstCost.incubator_months || 24;
      }

      renderParrots();
      calculateTotals();
    }

    // 渲染鹦鹉列表
    function renderParrots() {
      const container = document.getElementById('parrots-list');
      
      if (parrots.length === 0) {
        container.innerHTML = '<div class="loading"><p>暂无鹦鹉数据</p></div>';
        return;
      }

      let html = `
        <div class="parrot-row header">
          <div>鹦鹉名称</div>
          <div>变动成本</div>
          <div>固定成本</div>
          <div>总成本</div>
          <div>状态</div>
          <div>销售/最低价</div>
        </div>
      `;

      parrots.forEach(parrot => {
        const cost = costs.find(c => c.parrot_id === parrot.id) || {
          purchase_cost: 0,
          electricity_cost: 0,
          formula_cost: 0,
          bedding_cost: 0,
          medicine_cost: 0,
          misc_cost: 0,
          brooder_price: 300,
          brooder_months: 24,
          incubator_price: 500,
          incubator_months: 24,
          status: 'pending',
          sale_price: 0
        };

        // 计算天数
        const createdDate = parrot.created_at ? new Date(parrot.created_at) : new Date();
        const daysDiff = Math.floor((new Date() - createdDate) / (1000 * 60 * 60 * 24));
        const monthsDiff = daysDiff / 30;

        // 计算变动成本
        const variableCost = (cost.purchase_cost || 0) + 
                            (cost.electricity_cost || 0) + 
                            (cost.formula_cost || 0) + 
                            (cost.bedding_cost || 0) + 
                            (cost.medicine_cost || 0) + 
                            (cost.misc_cost || 0);

        // 计算固定成本（折旧）
        const brooderDepreciation = (cost.brooder_price / cost.brooder_months) * monthsDiff;
        const incubatorDepreciation = (cost.incubator_price / cost.incubator_months) * monthsDiff;
        const fixedCost = brooderDepreciation + incubatorDepreciation;

        // 总成本
        const totalCost = variableCost + fixedCost;

        html += `
          <div class="parrot-row" data-parrot-id="${parrot.id}">
            <div class="parrot-name">
              🦜 ${parrot.name}
              <div style="font-size: 0.8em; color: #888; margin-top: 5px;">
                手养 ${daysDiff} 天 (${monthsDiff.toFixed(1)} 个月)
              </div>
            </div>
            
            <div>
              <div style="font-size: 0.8em; color: #aaa; margin-bottom: 5px;">变动成本</div>
              <input type="number" class="cost-input variable-cost" 
                     data-parrot-id="${parrot.id}" 
                     value="${variableCost.toFixed(2)}"
                     onchange="updateVariableCost('${parrot.id}', this.value)"
                     step="0.01" min="0">
              <div style="font-size: 0.7em; color: #666; margin-top: 3px;">
                购：${(cost.purchase_cost || 0).toFixed(0)} 
                电：${(cost.electricity_cost || 0).toFixed(0)} 
                奶：${(cost.formula_cost || 0).toFixed(0)}
              </div>
            </div>
            
            <div>
              <div style="font-size: 0.8em; color: #aaa; margin-bottom: 5px;">固定成本</div>
              <div class="total-cost" style="color: orange;">¥${fixedCost.toFixed(2)}</div>
              <div style="font-size: 0.7em; color: #666; margin-top: 3px;">
                保温箱：¥${brooderDepreciation.toFixed(1)}<br>
                孵化器：¥${incubatorDepreciation.toFixed(1)}
              </div>
            </div>
            
            <div>
              <div class="total-cost" style="font-size: 1.2em;">¥${totalCost.toFixed(2)}</div>
            </div>
            
            <div>
              <select class="status-select" data-parrot-id="${parrot.id}" onchange="updateStatus('${parrot.id}', this.value)">
                <option value="pending" ${cost.status === 'pending' ? 'selected' : ''}>待销售</option>
                <option value="sold" ${cost.status === 'sold' ? 'selected' : ''}>已销售</option>
                <option value="kept" ${cost.status === 'kept' ? 'selected' : ''}>自留</option>
              </select>
            </div>
            
            <div>
              ${cost.status === 'sold' ? `
                <input type="number" class="sale-input" 
                       data-parrot-id="${parrot.id}" 
                       value="${cost.sale_price || 0}"
                       onchange="updateSalePrice('${parrot.id}', this.value)"
                       step="0.01" min="0"
                       placeholder="售价">
                <div class="profit-loss ${totalCost > (cost.sale_price || 0) ? 'loss' : 'profit'}" 
                     style="margin-top: 5px; font-size: 0.9em;">
                  ${totalCost > (cost.sale_price || 0) ? '亏' : '赚'}¥${Math.abs(totalCost - (cost.sale_price || 0)).toFixed(2)}
                </div>
              ` : `
                <div class="min-price" id="min-price-${parrot.id}">计算中...</div>
              `}
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    // 更新变动成本
    function updateVariableCost(parrotId, value) {
      const cost = costs.find(c => c.parrot_id === parrotId);
      if (cost) {
        cost.variable_cost_total = parseFloat(value) || 0;
      }
      calculateTotals();
    }

    // 更新状态
    function updateStatus(parrotId, status) {
      const cost = costs.find(c => c.parrot_id === parrotId);
      if (cost) {
        cost.status = status;
      }
      renderParrots();
      calculateTotals();
    }

    // 更新销售价格
    function updateSalePrice(parrotId, price) {
      const cost = costs.find(c => c.parrot_id === parrotId);
      if (cost) {
        cost.sale_price = parseFloat(price) || 0;
      }
      calculateTotals();
    }

    // 保存固定成本参数
    function saveFixedCosts() {
      showToast('✅ 固定成本参数已保存', 'success');
      calculateTotals();
    }

    // 保存所有成本
    async function saveAllCosts() {
      const updates = costs.map(async (cost) => {
        const { error } = await supabase
          .from('parrot_costs')
          .upsert({
            id: cost.id,
            parrot_id: cost.parrot_id,
            purchase_cost: cost.purchase_cost || 0,
            electricity_cost: cost.electricity_cost || 0,
            formula_cost: cost.formula_cost || 0,
            bedding_cost: cost.bedding_cost || 0,
            medicine_cost: cost.medicine_cost || 0,
            misc_cost: cost.misc_cost || 0,
            brooder_price: parseFloat(document.getElementById('brooder-price').value) || 300,
            brooder_months: parseFloat(document.getElementById('brooder-months').value) || 24,
            incubator_price: parseFloat(document.getElementById('incubator-price').value) || 500,
            incubator_months: parseFloat(document.getElementById('incubator-months').value) || 24,
            status: cost.status || 'pending',
            sale_price: cost.sale_price || 0,
            updated_at: new Date().toISOString()
          });

        if (error) {
          console.error('保存失败:', error);
        }
      });

      await Promise.all(updates);
      showToast('✅ 所有数据已保存', 'success');
    }

    // 计算总计和最低价
    function calculateTotals() {
      const brooderPrice = parseFloat(document.getElementById('brooder-price').value) || 300;
      const brooderMonths = parseFloat(document.getElementById('brooder-months').value) || 24;
      const incubatorPrice = parseFloat(document.getElementById('incubator-price').value) || 500;
      const incubatorMonths = parseFloat(document.getElementById('incubator-months').value) || 24;

      let totalCost = 0;
      let totalSoldAmount = 0;
      let pendingParrots = [];

      parrots.forEach(parrot => {
        const cost = costs.find(c => c.parrot_id === parrot.id) || {};
        
        const createdDate = parrot.created_at ? new Date(parrot.created_at) : new Date();
        const monthsDiff = (new Date() - createdDate) / (1000 * 60 * 60 * 24 * 30);

        const variableCost = (cost.purchase_cost || 0) + 
                            (cost.electricity_cost || 0) + 
                            (cost.formula_cost || 0) + 
                            (cost.bedding_cost || 0) + 
                            (cost.medicine_cost || 0) + 
                            (cost.misc_cost || 0);

        const brooderDepreciation = (brooderPrice / brooderMonths) * monthsDiff;
        const incubatorDepreciation = (incubatorPrice / incubatorMonths) * monthsDiff;
        const fixedCost = brooderDepreciation + incubatorDepreciation;

        const parrotTotalCost = variableCost + fixedCost;
        totalCost += parrotTotalCost;

        if (cost.status === 'sold') {
          totalSoldAmount += (cost.sale_price || 0);
        } else if (cost.status === 'pending') {
          pendingParrots.push({
            id: parrot.id,
            name: parrot.name,
            cost: parrotTotalCost
          });
        }
      });

      // 计算待销售鹦鹉的最低销售价格
      const remainingCost = totalCost - totalSoldAmount;
      const pendingCount = pendingParrots.length;

      pendingParrots.forEach(parrot => {
        const minPrice = pendingCount > 0 ? (parrot.cost / totalCost) * remainingCost : parrot.cost;
        const el = document.getElementById(`min-price-${parrot.id}`);
        if (el) {
          el.textContent = `¥${minPrice.toFixed(2)}`;
        }
      });

      // 更新统计
      document.getElementById('total-cost').textContent = `¥${totalCost.toFixed(2)}`;
      document.getElementById('total-sold').textContent = `¥${totalSoldAmount.toFixed(2)}`;
      document.getElementById('pending-count').textContent = pendingCount;

      // 计算盈亏
      const profitLoss = totalSoldAmount - totalCost;
      const profitEl = document.getElementById('profit-loss');
      const profitCard = document.getElementById('profit-card');
      const profitLabel = document.getElementById('profit-label');

      profitEl.textContent = `¥${profitLoss.toFixed(2)}`;
      
      if (totalSoldAmount === 0) {
        profitCard.className = 'stat-card';
        profitEl.className = 'number cyan';
        profitLabel.textContent = '未开始销售';
      } else if (profitLoss >= 0) {
        profitCard.className = 'stat-card profit';
        profitEl.className = 'number';
        profitLabel.textContent = '盈利 🎉';
      } else {
        profitCard.className = 'stat-card loss';
        profitEl.className = 'number';
        profitLabel.textContent = '亏损 😢';
      }
    }
  </script>
</body>
</html>
