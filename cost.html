<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 鹦鹉成本核算系统</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+SC:wght@400;700&display=swap');
    @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
      font-family: 'Noto Sans SC', sans-serif;
      color: #fff;
      padding: 20px;
    }

    /* 登录页面覆盖层 */
    #loginOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.98);
      z-index: 99999;
      display: none;
      justify-content: center;
      align-items: center;
    }

    #loginOverlay.active {
      display: flex;
    }

    .login-box {
      background: rgba(0, 0, 0, 0.9);
      border: 3px solid #00ffff;
      border-radius: 25px;
      padding: 50px 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 0 60px rgba(0, 255, 255, 0.4);
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 40px rgba(0, 255, 255, 0.3); }
      50% { box-shadow: 0 0 70px rgba(0, 255, 255, 0.6); }
    }

    .login-box h2 {
      color: #00ffff;
      font-size: 1.8em;
      margin-bottom: 15px;
      text-shadow: 0 0 15px #00ffff;
    }

    .login-box .subtitle {
      color: #888;
      font-size: 0.95em;
      margin-bottom: 35px;
    }

    .login-box input {
      width: 100%;
      padding: 18px 25px;
      background: rgba(0, 255, 255, 0.08);
      border: 2px solid #00ffff;
      border-radius: 15px;
      color: #fff;
      font-size: 1.1em;
      margin-bottom: 20px;
      text-align: center;
      transition: 0.3s;
    }

    .login-box input:focus {
      outline: none;
      border-color: #00ff00;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.5);
      background: rgba(0, 255, 255, 0.15);
    }

    .login-box input::placeholder {
      color: #666;
    }

    .login-box .login-btn {
      width: 100%;
      padding: 18px 30px;
      background: linear-gradient(45deg, #00ffff, #0088ff);
      border: none;
      border-radius: 15px;
      color: #fff;
      font-size: 1.1em;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 15px;
    }

    .login-box .login-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 35px rgba(0, 255, 255, 0.6);
    }

    .login-box .error-msg {
      color: #ff0000;
      font-size: 0.9em;
      margin-top: 15px;
      display: none;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
    }

    .login-box .error-msg.visible {
      display: block;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .login-box .hint {
      color: #666;
      font-size: 0.8em;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    /* 导航 */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 15px;
      border: 2px solid #00ffff;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 1.5em;
      font-weight: 900;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .nav-links a,
    .nav-links .btn {
      color: #00ffff;
      text-decoration: none;
      padding: 10px 20px;
      border: 2px solid #00ffff;
      border-radius: 25px;
      transition: 0.3s;
    }

    .nav-links a:hover,
    .nav-links .btn:hover {
      background: #00ffff;
      color: #000;
    }

    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #00ffff;
      border-radius: 15px;
      padding: 25px;
      text-align: center;
      transition: 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 255, 255, 0.2);
    }

    .stat-card.profit { border-color: #00ff00; }
    .stat-card.loss { border-color: #ff0000; }

    .stat-card .number {
      font-size: 2.2em;
      font-weight: 900;
      margin: 15px 0 10px 0;
    }

    .stat-card.profit .number { color: #00ff00; text-shadow: 0 0 15px #00ff00; }
    .stat-card.loss .number { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
    .stat-card .number.cyan { color: #00ffff; text-shadow: 0 0 15px #00ffff; }

    .stat-card .label {
      color: #aaa;
      font-size: 0.95em;
      line-height: 1.6;
    }

    /* 鹦鹉列表 */
    .parrots-section {
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #00ffff;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .section-title {
      font-size: 1.5em;
      color: #00ffff;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* 表格样式 */
    .parrot-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
    }

    .parrot-table thead th {
      background: rgba(0, 255, 255, 0.15);
      color: #00ffff;
      font-weight: 700;
      padding: 15px 12px;
      text-align: left;
      border: 1px solid rgba(0, 255, 255, 0.3);
    }

    .parrot-table thead th:first-child {
      border-radius: 10px 0 0 10px;
      min-width: 180px;
    }

    .parrot-table thead th:last-child {
      border-radius: 0 10px 10px 0;
    }

    .parrot-table tbody tr {
      background: rgba(0, 255, 255, 0.03);
      transition: 0.2s;
    }

    .parrot-table tbody tr:hover {
      background: rgba(0, 255, 255, 0.08);
      transform: scale(1.01);
    }

    .parrot-table tbody td {
      padding: 15px 12px;
      border: 1px solid rgba(0, 255, 255, 0.15);
      vertical-align: middle;
    }

    .parrot-table tbody tr:first-child td:first-child {
      border-radius: 10px 0 0 10px;
    }

    .parrot-table tbody tr:first-child td:last-child {
      border-radius: 0 10px 10px 0;
    }

    .parrot-name {
      font-weight: 700;
      color: #fff;
      font-size: 1.05em;
    }

    .parrot-name .days {
      display: block;
      font-size: 0.8em;
      color: #888;
      margin-top: 5px;
      font-weight: 400;
    }

    /* 输入框通用样式 */
    .cost-input, .sale-input, .status-select {
      width: 100%;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #00ffff;
      border-radius: 8px;
      color: #fff;
      text-align: right;
      font-size: 0.95em;
      transition: 0.2s;
    }

    .cost-input:focus, .sale-input:focus, .status-select:focus {
      outline: none;
      border-color: #00ff00;
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
    }

    .cost-input:disabled, .sale-input:disabled {
      background: rgba(0, 0, 0, 0.3);
      border-color: #444;
      color: #888;
      cursor: not-allowed;
    }

    .status-select {
      cursor: pointer;
      text-align: center;
    }

    .status-select option {
      background: #1a1a2e;
      color: #fff;
    }

    /* 显示值样式 */
    .display-value {
      font-weight: 700;
      text-align: right;
      padding: 8px 12px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.3);
    }

    .display-value.variable { color: #00ffff; }
    .display-value.fixed { color: orange; }
    .display-value.total { color: #ff00ff; font-size: 1.1em; }
    .display-value.min-price { color: #00ff00; }

    .sale-input {
      border-color: #00ff00;
      color: #00ff00;
    }

    .sale-input:focus {
      box-shadow: 0 0 12px rgba(0, 255, 0, 0.4);
    }

    /* 盈亏显示 */
    .profit-loss {
      font-weight: 700;
      text-align: right;
      margin-top: 6px;
      font-size: 0.9em;
      padding: 4px 8px;
      border-radius: 5px;
      display: inline-block;
      min-width: 80px;
    }

    .profit-loss.profit { 
      color: #00ff00; 
      background: rgba(0, 255, 0, 0.1);
    }
    .profit-loss.loss { 
      color: #ff0000; 
      background: rgba(255, 0, 0, 0.1);
    }

    /* 按钮 */
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.95em;
      transition: 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(45deg, #00ffff, #0088ff);
      color: #fff;
    }

    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }

    .btn-save {
      background: linear-gradient(45deg, #00ff00, #00aa00);
      color: #000;
      margin-top: 20px;
      width: 100%;
      padding: 16px;
      font-size: 1.05em;
    }

    .btn-save:hover {
      transform: scale(1.02);
      box-shadow: 0 0 25px rgba(0, 255, 0, 0.5);
    }

    .btn-edit {
      background: linear-gradient(45deg, #ff6600, #ff8800);
      color: #fff;
      padding: 6px 12px;
      font-size: 0.85em;
    }

    .btn-edit:hover {
      box-shadow: 0 0 15px rgba(255, 102, 0, 0.5);
    }

    /* 固定成本设置 */
    .fixed-costs {
      background: rgba(255, 165, 0, 0.1);
      border: 2px solid orange;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
    }

    .fixed-costs .section-title {
      color: orange;
      margin-bottom: 20px;
    }

    .fixed-cost-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .fixed-cost-item {
      background: rgba(0, 0, 0, 0.5);
      padding: 18px;
      border-radius: 12px;
      border: 1px solid rgba(255, 165, 0, 0.3);
    }

    .fixed-cost-item label {
      display: block;
      color: orange;
      margin-bottom: 8px;
      font-size: 0.9em;
      font-weight: 600;
    }

    .fixed-cost-item input {
      width: 100%;
      padding: 10px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid orange;
      border-radius: 8px;
      color: #fff;
      font-size: 1em;
    }

    .fixed-cost-item input:focus {
      outline: none;
      border-color: #ff6600;
      box-shadow: 0 0 10px rgba(255, 165, 0, 0.3);
    }

    .fixed-cost-item .desc {
      font-size: 0.75em;
      color: #888;
      margin-top: 6px;
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 60px;
      color: #aaa;
    }

    .loading i {
      font-size: 3em;
      color: #00ffff;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 响应式 */
    @media (max-width: 1400px) {
      .parrot-table {
        font-size: 0.9em;
      }
      .parrot-table thead th,
      .parrot-table tbody td {
        padding: 12px 8px;
      }
    }

    @media (max-width: 1200px) {
      .parrot-table thead th:nth-child(4),
      .parrot-table tbody td:nth-child(4) {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 15px;
      }
      
      .nav-links {
        flex-wrap: wrap;
        justify-content: center;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .fixed-cost-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
    }

    .toast {
      min-width: 320px;
      padding: 16px 20px;
      margin-bottom: 12px;
      border-radius: 12px;
      color: #fff;
      font-weight: 700;
      box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.3s ease;
    }

    .toast.success { background: linear-gradient(45deg, rgba(0, 255, 0, 0.9), rgba(0, 200, 0, 0.9)); border: 2px solid #00ff00; }
    .toast.error { background: linear-gradient(45deg, rgba(255, 0, 0, 0.9), rgba(200, 0, 0, 0.9)); border: 2px solid #ff0000; }
    .toast.info { background: linear-gradient(45deg, rgba(0, 255, 255, 0.9), rgba(0, 200, 255, 0.9)); border: 2px solid #00ffff; }
    .toast.warning { background: linear-gradient(45deg, rgba(255, 165, 0, 0.9), rgba(255, 140, 0, 0.9)); border: 2px solid orange; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* 管理员模式提示 */
    .admin-notice {
      background: rgba(255, 165, 0, 0.15);
      border: 2px dashed orange;
      border-radius: 10px;
      padding: 15px 20px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 12px;
    }

    .admin-notice.active {
      display: flex;
    }

    .admin-notice i {
      color: orange;
      font-size: 1.3em;
    }

    .admin-notice span {
      color: orange;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- 登录覆盖层（未登录时显示） -->
  <div id="loginOverlay">
    <div class="login-box">
      <h2><i class="fas fa-lock"></i> 管理员验证</h2>
      <p class="subtitle">💰 鹦鹉成本核算系统 - 仅限管理员访问</p>
      <input type="password" id="loginPassword" placeholder="请输入管理员密码" onkeypress="if(event.key==='Enter') handleLogin()">
      <button class="login-btn" onclick="handleLogin()">
        <i class="fas fa-unlock"></i> 解锁系统
      </button>
      <p class="error-msg" id="loginError">❌ 密码错误，请重试</p>
      <p class="hint">
        <i class="fas fa-shield-alt"></i> 系统已加密，仅授权人员可查看成本数据<br>
        刷新页面或退出后需重新验证
      </p>
    </div>
  </div>

  <div class="container" id="mainContainer" style="display: none;">
    <!-- 导航 -->
    <nav class="navbar">
      <div class="logo">💰 鹦鹉成本核算系统</div>
      <div class="nav-links">
        <span id="adminStatus" style="color: #00ff00; font-size: 0.85em; margin-right: 10px;">
          <i class="fas fa-check-circle"></i> 管理员已登录
        </span>
        <button class="btn btn-primary" id="logout-btn" onclick="handleLogout()" style="padding: 10px 20px; font-size: 0.9em; background: linear-gradient(45deg, #ff6600, #ff4400);">
          <i class="fas fa-sign-out-alt"></i> 退出登录
        </button>
        <a href="index.html"><i class="fas fa-home"></i> 返回首页</a>
        <a href="#" onclick="location.reload()"><i class="fas fa-sync"></i> 刷新</a>
      </div>
    </nav>



    <!-- 总体统计 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">📊 总成本</div>
        <div class="number cyan" id="total-cost">¥0</div>
        <div class="label">所有鹦鹉累计投入</div>
      </div>
      <div class="stat-card">
        <div class="label">💵 已销售金额</div>
        <div class="number cyan" id="total-sold">¥0</div>
        <div class="label">已回笼资金</div>
      </div>
      <div class="stat-card" id="profit-card">
        <div class="label">📈 盈亏状况</div>
        <div class="number" id="profit-loss">¥0</div>
        <div class="label" id="profit-label">未开始销售</div>
      </div>
      <div class="stat-card">
        <div class="label">🦜 待销售鹦鹉</div>
        <div class="number cyan" id="pending-count">0</div>
        <div class="label">需要计算最低价</div>
      </div>
    </div>

    <!-- 固定成本设置 -->
    <div class="fixed-costs">
      <h2 class="section-title">
        <i class="fas fa-cog"></i> 固定成本参数
      </h2>
      <div class="fixed-cost-grid">
        <div class="fixed-cost-item">
          <label>🔥 保温箱价格 (元)</label>
          <input type="number" id="brooder-price" value="300" onchange="saveFixedCosts()">
          <div class="desc">购买保温箱的总费用</div>
        </div>
        <div class="fixed-cost-item">
          <label>📅 保温箱摊销 (月)</label>
          <input type="number" id="brooder-months" value="24" onchange="saveFixedCosts()">
          <div class="desc">多少个月分摊完成本</div>
        </div>
        <div class="fixed-cost-item">
          <label>🥚 孵化器价格 (元)</label>
          <input type="number" id="incubator-price" value="500" onchange="saveFixedCosts()">
          <div class="desc">购买孵化器的总费用</div>
        </div>
        <div class="fixed-cost-item">
          <label>📅 孵化器摊销 (月)</label>
          <input type="number" id="incubator-months" value="24" onchange="saveFixedCosts()">
          <div class="desc">多少个月分摊完成本</div>
        </div>
      </div>
    </div>

    <!-- 鹦鹉成本列表 -->
    <div class="parrots-section">
      <h2 class="section-title">
        <i class="fas fa-feather"></i> 鹦鹉成本明细
      </h2>
      
      <div id="parrots-list">
        <div class="loading">
          <i class="fas fa-spinner"></i>
          <p>正在加载数据...</p>
        </div>
      </div>

      <button class="btn btn-save" onclick="saveAllCosts()">
        <i class="fas fa-save"></i> 保存所有修改
      </button>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Supabase 配置
    const SUPABASE_URL = 'https://nxiwatmgedlvzlxmgyhw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54aXdhdG1nZWRsdnpseG1neWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTI2NDgsImV4cCI6MjA4ODA2ODY0OH0.5VBRX8bZkrUiw1DL5Y9bpkMtC-0RVdaoFLEdqWXS2c4';

    let supaclient = null;
    let parrots = [];
    let costs = [];
    let isAdminLoggedIn = false;

    // 管理员密码
    const ADMIN_PASSWORD = 'yan8752';

    // 页面加载时检查登录状态
    document.addEventListener('DOMContentLoaded', function() {
      checkLoginStatus();
    });

    // 检查登录状态（使用 sessionStorage，刷新后失效）
    function checkLoginStatus() {
      const isLoggedIn = sessionStorage.getItem('costSystemLoggedIn') === 'true';
      const loginOverlay = document.getElementById('loginOverlay');
      const mainContainer = document.getElementById('mainContainer');
      
      if (isLoggedIn) {
        // 已登录，隐藏登录页，显示主界面
        loginOverlay.classList.remove('active');
        mainContainer.style.display = 'block';
        isAdminLoggedIn = true;
        // 加载数据
        try {
          supaclient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          loadData();
        } catch (e) {
          console.error('Supabase 初始化失败:', e);
          showToast('❌ 数据库连接失败', 'error');
        }
      } else {
        // 未登录，显示登录页，隐藏主界面
        loginOverlay.classList.add('active');
        mainContainer.style.display = 'none';
        isAdminLoggedIn = false;
      }
    }

    // 处理登录
    function handleLogin() {
      const input = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      
      if (input === ADMIN_PASSWORD) {
        // 登录成功，存储到 sessionStorage（刷新后失效）
        sessionStorage.setItem('costSystemLoggedIn', 'true');
        sessionStorage.setItem('costSystemAdmin', 'admin');
        
        // 清空密码
        document.getElementById('loginPassword').value = '';
        errorEl.classList.remove('visible');
        
        // 更新 UI
        checkLoginStatus();
        showToast('✅ 验证成功！欢迎管理员', 'success');
      } else {
        // 登录失败
        errorEl.classList.add('visible');
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginPassword').focus();
      }
    }

    // 处理登出
    function handleLogout() {
      if (confirm('确定要退出登录吗？退出后将无法查看成本数据。')) {
        // 清除会话
        sessionStorage.removeItem('costSystemLoggedIn');
        sessionStorage.removeItem('costSystemAdmin');
        
        // 显示登录页
        checkLoginStatus();
        showToast('🔒 已安全退出', 'info');
      }
    }

    // 初始化已移到 checkLoginStatus 中，登录后才加载数据

    // Toast 提示
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'info-circle';
      toast.innerHTML = `<i class="fas fa-${icon}"></i><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideOutRight 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // 加载数据
    async function loadData() {
      // 加载鹦鹉
      const { data: parrotsData, error: parrotsError } = await supaclient
        .from('parrots')
        .select('*')
        .order('created_at', { ascending: false });

      if (parrotsError) {
        console.error('加载鹦鹉失败:', parrotsError);
        showToast('❌ 加载鹦鹉数据失败', 'error');
        return;
      }

      parrots = parrotsData || [];

      // 加载成本
      const { data: costsData, error: costsError } = await supaclient
        .from('parrot_costs')
        .select('*');

      if (costsError) {
        console.error('加载成本失败:', costsError);
        showToast('❌ 加载成本数据失败', 'error');
        return;
      }

      costs = costsData || [];

      // 加载固定成本参数（从第一条记录获取）
      if (costs.length > 0) {
        const firstCost = costs[0];
        document.getElementById('brooder-price').value = firstCost.brooder_price || 300;
        document.getElementById('brooder-months').value = firstCost.brooder_months || 24;
        document.getElementById('incubator-price').value = firstCost.incubator_price || 500;
        document.getElementById('incubator-months').value = firstCost.incubator_months || 24;
      }

      renderParrots();
      calculateTotals();
    }

    // 渲染鹦鹉列表
    function renderParrots() {
      const container = document.getElementById('parrots-list');
      
      if (parrots.length === 0) {
        container.innerHTML = '<div class="loading"><p>暂无鹦鹉数据</p></div>';
        return;
      }

      let html = `
        <table class="parrot-table">
          <thead>
            <tr>
              <th style="min-width:120px">🦜 鹦鹉名称</th>
              <th style="min-width:70px">📅 手养月</th>
              <th style="min-width:80px">💰 购买</th>
              <th style="min-width:65px">⚡ 电费</th>
              <th style="min-width:65px">🥛 奶粉</th>
              <th style="min-width:65px">🧻 垫料</th>
              <th style="min-width:65px">💊 药品</th>
              <th style="min-width:65px">🔧 杂费</th>
              <th style="min-width:75px">📊 变动</th>
              <th style="min-width:85px">⚙️ 固定</th>
              <th style="min-width:75px">📈 总成本</th>
              <th style="min-width:85px">📋 状态</th>
              <th style="min-width:130px">💵 销售/最低</th>
            </tr>
          </thead>
          <tbody>
      `;

      parrots.forEach(parrot => {
        const cost = costs.find(c => c.parrot_id === parrot.id) || {
          purchase_cost: 0,
          electricity_cost: 0,
          formula_cost: 0,
          bedding_cost: 0,
          medicine_cost: 0,
          misc_cost: 0,
          brooder_price: 300,
          brooder_months: 24,
          incubator_price: 500,
          incubator_months: 24,
          status: 'pending',
          sale_price: 0
        };

        // 计算天数
        const createdDate = parrot.created_at ? new Date(parrot.created_at) : new Date();
        const daysDiff = Math.floor((new Date() - createdDate) / (1000 * 60 * 60 * 24));
        // 优先使用自定义月数，否则自动计算
        const monthsDiff = cost.custom_months || Math.max(0.1, daysDiff / 30);

        // 计算变动成本（各项求和）
        const purchaseCost = cost.purchase_cost || 0;
        const electricityCost = cost.electricity_cost || 0;
        const formulaCost = cost.formula_cost || 0;
        const beddingCost = cost.bedding_cost || 0;
        const medicineCost = cost.medicine_cost || 0;
        const miscCost = cost.misc_cost || 0;
        const variableCost = purchaseCost + electricityCost + formulaCost + beddingCost + medicineCost + miscCost;

        // 计算固定成本（折旧）
        const brooderDepreciation = (cost.brooder_price / cost.brooder_months) * monthsDiff;
        const incubatorDepreciation = (cost.incubator_price / cost.incubator_months) * monthsDiff;
        const fixedCost = brooderDepreciation + incubatorDepreciation;

        // 总成本
        const totalCost = variableCost + fixedCost;

        // 盈亏计算
        const profitLoss = (cost.sale_price || 0) - totalCost;
        const isProfit = profitLoss >= 0;

        html += `
          <tr data-parrot-id="${parrot.id}">
            <td>
              <div class="parrot-name">
                🦜 ${parrot.name}
                <span class="days">破壳：${createdDate.toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'})}</span>
              </div>
            </td>
            <td>
              <input type="number" class="cost-input" id="months-${parrot.id}" 
                     value="${monthsDiff.toFixed(1)}" step="0.1" min="0.1" 
                     onchange="updateMonths('${parrot.id}', this.value)"
                     style="width:100%;font-size:0.9em"
                     title="手养月数，可手动调整">
            </td>
            <td><input type="number" class="cost-input" value="${purchaseCost.toFixed(2)}" onchange="updateCostField('${parrot.id}','purchase_cost',this.value)" step="0.01" min="0" style="width:100%"></td>
            <td><input type="number" class="cost-input" value="${electricityCost.toFixed(2)}" onchange="updateCostField('${parrot.id}','electricity_cost',this.value)" step="0.01" min="0" style="width:100%"></td>
            <td><input type="number" class="cost-input" value="${formulaCost.toFixed(2)}" onchange="updateCostField('${parrot.id}','formula_cost',this.value)" step="0.01" min="0" style="width:100%"></td>
            <td><input type="number" class="cost-input" value="${beddingCost.toFixed(2)}" onchange="updateCostField('${parrot.id}','bedding_cost',this.value)" step="0.01" min="0" style="width:100%"></td>
            <td><input type="number" class="cost-input" value="${medicineCost.toFixed(2)}" onchange="updateCostField('${parrot.id}','medicine_cost',this.value)" step="0.01" min="0" style="width:100%"></td>
            <td><input type="number" class="cost-input" value="${miscCost.toFixed(2)}" onchange="updateCostField('${parrot.id}','misc_cost',this.value)" step="0.01" min="0" style="width:100%"></td>
            <td><div class="display-value variable" style="font-weight:700;font-size:0.95em">¥${variableCost.toFixed(2)}</div></td>
            <td>
              <div class="display-value fixed" style="font-size:0.95em;cursor:pointer" 
                   onclick="editFixedCosts('${parrot.id}')" 
                   title="点击编辑固定成本参数">
                ¥${fixedCost.toFixed(2)}
              </div>
              <div style="font-size:0.6em;color:#888;margin-top:2px;line-height:1.3">
                保:¥${brooderDepreciation.toFixed(1)}<br>孵:¥${incubatorDepreciation.toFixed(1)}
              </div>
            </td>
            <td><div class="display-value total" style="font-size:1em">¥${totalCost.toFixed(2)}</div></td>
            <td>
              <select class="status-select" data-parrot-id="${parrot.id}" onchange="updateStatus('${parrot.id}',this.value)" style="font-size:0.85em;padding:6px 4px">
                <option value="pending" ${cost.status === 'pending' ? 'selected' : ''}>待销售</option>
                <option value="sold" ${cost.status === 'sold' ? 'selected' : ''}>已销售</option>
                <option value="kept" ${cost.status === 'kept' ? 'selected' : ''}>自留</option>
              </select>
            </td>
            <td>
              ${cost.status === 'sold' ? `
                <input type="number" class="sale-input" 
                       data-parrot-id="${parrot.id}" 
                       value="${cost.sale_price || 0}"
                       onchange="updateSalePrice('${parrot.id}', this.value)"
                       step="0.01" min="0"
                       placeholder="售价"
                       style="font-size:0.9em">
                <div class="profit-loss ${isProfit ? 'profit' : 'loss'}" style="margin-top:4px;font-size:0.75em">
                  ${isProfit ? '↑' : '↓'}¥${Math.abs(profitLoss).toFixed(1)}
                </div>
              ` : `
                <div class="display-value min-price" id="min-price-${parrot.id}" style="font-size:0.85em">¥--</div>
                <button class="btn btn-edit" style="margin-top:4px;padding:4px 8px;font-size:0.7em" onclick="markAsSold('${parrot.id}')"><i class="fas fa-check"></i> 已售</button>
              `}
            </td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    // 更新手养月数
    function updateMonths(parrotId, value) {
      const cost = costs.find(c => c.parrot_id === parrotId);
      if (cost) {
        cost.custom_months = parseFloat(value) || 0.1;
      }
      renderParrots();
      calculateTotals();
    }

    // 编辑固定成本参数（每只鹦鹉可单独设置）
    function editFixedCosts(parrotId) {
      const cost = costs.find(c => c.parrot_id === parrotId);
      if (!cost) return;

      const brooderPrice = prompt('保温箱价格 (元):', cost.brooder_price || 300);
      if (brooderPrice === null) return;
      cost.brooder_price = parseFloat(brooderPrice) || 300;

      const brooderMonths = prompt('保温箱摊销 (月):', cost.brooder_months || 24);
      if (brooderMonths === null) return;
      cost.brooder_months = parseFloat(brooderMonths) || 24;

      const incubatorPrice = prompt('孵化器价格 (元):', cost.incubator_price || 500);
      if (incubatorPrice === null) return;
      cost.incubator_price = parseFloat(incubatorPrice) || 500;

      const incubatorMonths = prompt('孵化器摊销 (月):', cost.incubator_months || 24);
      if (incubatorMonths === null) return;
      cost.incubator_months = parseFloat(incubatorMonths) || 24;

      renderParrots();
      calculateTotals();
      showToast('✅ 固定成本参数已更新', 'success');
    }

    // 更新单个成本字段
    function updateCostField(parrotId, field, value) {
      const cost = costs.find(c => c.parrot_id === parrotId);
      if (cost) {
        cost[field] = parseFloat(value) || 0;
      }
      renderParrots();
      calculateTotals();
    }

    // 标记为已售
    function markAsSold(parrotId) {
      const cost = costs.find(c => c.parrot_id === parrotId);
      if (cost) {
        cost.status = 'sold';
        cost.sale_price = 0; // 重置售价，让用户填写
      }
      renderParrots();
      calculateTotals();
      showToast('📝 已标记为待填售价', 'info');
    }

    // 更新状态
    function updateStatus(parrotId, status) {
      const cost = costs.find(c => c.parrot_id === parrotId);
      if (cost) {
        cost.status = status;
        if (status !== 'sold') {
          cost.sale_price = 0;
        }
      }
      renderParrots();
      calculateTotals();
    }

    // 更新销售价格
    function updateSalePrice(parrotId, price) {
      const cost = costs.find(c => c.parrot_id === parrotId);
      if (cost) {
        cost.sale_price = parseFloat(price) || 0;
      }
      calculateTotals();
    }

    // 保存固定成本参数
    function saveFixedCosts() {
      showToast('✅ 固定成本参数已保存', 'success');
      calculateTotals();
      renderParrots(); // 重新渲染以更新固定成本显示
    }

    // 保存所有成本
    async function saveAllCosts() {
      const brooderPrice = parseFloat(document.getElementById('brooder-price').value) || 300;
      const brooderMonths = parseFloat(document.getElementById('brooder-months').value) || 24;
      const incubatorPrice = parseFloat(document.getElementById('incubator-price').value) || 500;
      const incubatorMonths = parseFloat(document.getElementById('incubator-months').value) || 24;

      const updates = costs.map(async (cost) => {
        const { error } = await supaclient
          .from('parrot_costs')
          .upsert({
            id: cost.id,
            parrot_id: cost.parrot_id,
            purchase_cost: cost.purchase_cost || 0,
            electricity_cost: cost.electricity_cost || 0,
            formula_cost: cost.formula_cost || 0,
            bedding_cost: cost.bedding_cost || 0,
            medicine_cost: cost.medicine_cost || 0,
            misc_cost: cost.misc_cost || 0,
            brooder_price: brooderPrice,
            brooder_months: brooderMonths,
            incubator_price: incubatorPrice,
            incubator_months: incubatorMonths,
            status: cost.status || 'pending',
            sale_price: cost.sale_price || 0,
            updated_at: new Date().toISOString()
          }, {
            onConflict: 'parrot_id'
          });

        if (error) {
          console.error('保存失败:', error);
        }
      });

      await Promise.all(updates);
      showToast('✅ 所有数据已保存到数据库', 'success');
    }

    // 计算总计和最低价
    function calculateTotals() {
      const brooderPrice = parseFloat(document.getElementById('brooder-price').value) || 300;
      const brooderMonths = parseFloat(document.getElementById('brooder-months').value) || 24;
      const incubatorPrice = parseFloat(document.getElementById('incubator-price').value) || 500;
      const incubatorMonths = parseFloat(document.getElementById('incubator-months').value) || 24;

      let totalCost = 0;
      let totalSoldAmount = 0;
      let pendingParrots = [];

      parrots.forEach(parrot => {
        const cost = costs.find(c => c.parrot_id === parrot.id) || {};
        
        const createdDate = parrot.created_at ? new Date(parrot.created_at) : new Date();
        const autoMonths = Math.max(0.1, (new Date() - createdDate) / (1000 * 60 * 60 * 24 * 30));
        const monthsDiff = cost.custom_months || autoMonths;

        const variableCost = (cost.purchase_cost || 0) + 
                            (cost.electricity_cost || 0) + 
                            (cost.formula_cost || 0) + 
                            (cost.bedding_cost || 0) + 
                            (cost.medicine_cost || 0) + 
                            (cost.misc_cost || 0);

        const brooderDepreciation = (brooderPrice / brooderMonths) * monthsDiff;
        const incubatorDepreciation = (incubatorPrice / incubatorMonths) * monthsDiff;
        const fixedCost = brooderDepreciation + incubatorDepreciation;

        const parrotTotalCost = variableCost + fixedCost;
        totalCost += parrotTotalCost;

        if (cost.status === 'sold') {
          totalSoldAmount += (cost.sale_price || 0);
        } else if (cost.status === 'pending') {
          pendingParrots.push({
            id: parrot.id,
            name: parrot.name,
            cost: parrotTotalCost
          });
        }
      });

      // 计算待销售鹦鹉的最低销售价格（保本价）
      const remainingCost = Math.max(0, totalCost - totalSoldAmount);
      const pendingCount = pendingParrots.length;

      pendingParrots.forEach(parrot => {
        // 最低价 = 这只鹦鹉的成本 + (剩余总成本 / 待销售数量)
        const minPrice = pendingCount > 0 ? parrot.cost + (remainingCost / pendingCount) : parrot.cost;
        const el = document.getElementById(`min-price-${parrot.id}`);
        if (el) {
          el.textContent = `¥${minPrice.toFixed(2)}`;
          el.title = `保本最低价：覆盖这只鹦鹉成本 ¥${parrot.cost.toFixed(2)} + 分摊剩余成本`;
        }
      });

      // 更新统计卡片
      document.getElementById('total-cost').textContent = `¥${totalCost.toFixed(2)}`;
      document.getElementById('total-sold').textContent = `¥${totalSoldAmount.toFixed(2)}`;
      document.getElementById('pending-count').textContent = pendingCount;

      // 计算盈亏
      const profitLoss = totalSoldAmount - totalCost;
      const profitEl = document.getElementById('profit-loss');
      const profitCard = document.getElementById('profit-card');
      const profitLabel = document.getElementById('profit-label');

      profitEl.textContent = `¥${profitLoss.toFixed(2)}`;
      
      if (totalSoldAmount === 0) {
        profitCard.className = 'stat-card';
        profitEl.className = 'number cyan';
        profitLabel.textContent = '未开始销售';
      } else if (profitLoss >= 0) {
        profitCard.className = 'stat-card profit';
        profitEl.className = 'number';
        profitLabel.textContent = '盈利 🎉';
      } else {
        profitCard.className = 'stat-card loss';
        profitEl.className = 'number';
        profitLabel.textContent = '亏损 😢';
      }
    }
  </script>
</body>
</html>
