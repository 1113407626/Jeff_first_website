<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦜 手养鹦鹉之家</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+SC:wght@400;700&display=swap');
    @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
      font-family: 'Noto Sans SC', 'Orbitron', sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* 动态背景 */
    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* 导航栏 */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 30px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    }

    .logo {
      font-size: 1.8em;
      font-weight: 900;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo i { animation: float 3s ease-in-out infinite; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-btn {
      padding: 10px 20px;
      border: 2px solid #00ffff;
      border-radius: 25px;
      color: #00ffff;
      background: transparent;
      cursor: pointer;
      font-size: 1em;
      transition: 0.3s;
      font-family: 'Orbitron', sans-serif;
    }

    .nav-btn:hover {
      background: #00ffff;
      color: #000;
      box-shadow: 0 0 20px #00ffff;
    }

    .nav-btn.active {
      background: #00ffff;
      color: #000;
    }

    /* 主内容区 */
    .main-content {
      position: relative;
      z-index: 1;
      padding: 100px 30px 50px;
      min-height: 100vh;
    }

    /* 欢迎区 */
    .hero {
      text-align: center;
      margin-bottom: 50px;
      animation: slideDown 1s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero h1 {
      font-size: 3.5em;
      font-weight: 900;
      color: #00ffff;
      text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
      margin-bottom: 15px;
    }

    .hero p {
      font-size: 1.3em;
      color: #aaa;
      max-width: 600px;
      margin: 0 auto;
    }

    /* 统计卡片 */
    .stats-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 30px 0 50px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(0, 255, 255, 0.1);
      border: 2px solid #00ffff;
      border-radius: 15px;
      padding: 20px 40px;
      text-align: center;
      backdrop-filter: blur(10px);
      animation: scaleIn 0.5s ease;
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .stat-card .number {
      font-size: 2.5em;
      font-weight: 900;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
    }

    .stat-card .label {
      font-size: 1em;
      color: #aaa;
      margin-top: 5px;
    }

    /* 鹦鹉展示区 */
    .parrots-section {
      max-width: 1400px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 2em;
      color: #00ffff;
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #00ffff;
    }

    .parrots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
    }

    .parrot-card {
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #00ffff;
      border-radius: 20px;
      overflow: hidden;
      transition: 0.3s;
      position: relative;
      animation: cardAppear 0.5s ease;
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .parrot-card:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 10px 40px rgba(0, 255, 255, 0.4);
      border-color: #ff00ff;
    }

    .parrot-card:hover .parrot-image {
      transform: scale(1.1);
    }

    .parrot-image-container {
      width: 100%;
      height: 250px;
      overflow: hidden;
      position: relative;
    }

    .parrot-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.5s;
    }

    .parrot-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .parrot-card.video-mode .parrot-image { display: none; }
    .parrot-card.video-mode .parrot-video { display: block; }

    .video-toggle {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #00ffff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: #00ffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
      z-index: 10;
    }

    .video-toggle:hover {
      background: #00ffff;
      color: #000;
    }

    .parrot-info {
      padding: 20px;
    }

    .parrot-name {
      font-size: 1.5em;
      font-weight: 700;
      color: #00ffff;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .parrot-name i { animation: float 2s ease-in-out infinite; }

    .parrot-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .detail-item {
      background: rgba(0, 255, 255, 0.1);
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .detail-item .icon {
      font-size: 1.2em;
      margin-bottom: 5px;
    }

    .detail-item .value {
      font-size: 1.1em;
      font-weight: 700;
      color: #ff00ff;
    }

    .detail-item .label {
      font-size: 0.8em;
      color: #888;
    }

    .parrot-price {
      font-size: 1.8em;
      font-weight: 900;
      color: #00ff00;
      text-align: center;
      text-shadow: 0 0 10px #00ff00;
      margin-top: 15px;
    }

    .parrot-price::before { content: '¥ '; }

    .days-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      padding: 8px 15px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.9em;
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* 管理面板 */
    .admin-panel {
      display: none;
      max-width: 800px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #00ffff;
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(10px);
    }

    .admin-panel.show { display: block; }

    /* 登录界面 */
    #admin-login {
      text-align: center;
      padding: 30px 0;
    }

    #admin-login input {
      max-width: 300px;
      margin: 0 auto 20px;
    }

    .admin-title {
      font-size: 1.8em;
      color: #00ffff;
      text-align: center;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #00ffff;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 15px;
      background: rgba(0, 255, 255, 0.1);
      border: 2px solid #00ffff;
      border-radius: 10px;
      color: #fff;
      font-size: 1em;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(45deg, #00ffff, #ff00ff);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1.2em;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Orbitron', sans-serif;
    }

    .submit-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .file-preview {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .file-preview img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid #00ffff;
    }

    /* 删除按钮 */
    .delete-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(255, 0, 0, 0.8);
      border: 2px solid #ff0000;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
      opacity: 0;
    }

    .parrot-card:hover .delete-btn { opacity: 1; }

    .delete-btn:hover {
      background: #ff0000;
      box-shadow: 0 0 15px #ff0000;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 50px;
      color: #666;
    }

    .empty-state i {
      font-size: 4em;
      margin-bottom: 20px;
      color: #333;
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 50px;
    }

    .loading i {
      font-size: 3em;
      color: #00ffff;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 15px;
        padding: 15px;
      }

      .nav-links { flex-wrap: wrap; justify-content: center; }

      .hero h1 { font-size: 2em; }

      .parrots-grid {
        grid-template-columns: 1fr;
      }

      .stats-container { gap: 15px; }

      .stat-card { padding: 15px 25px; }

      .form-row { grid-template-columns: 1fr; }
    }

    /* 鹦鹉动画 */
    .flying-parrot {
      position: fixed;
      font-size: 2em;
      z-index: 999;
      pointer-events: none;
      animation: flyAcross 15s linear infinite;
    }

    @keyframes flyAcross {
      from {
        left: -50px;
        top: 20%;
        transform: scaleX(1);
      }
      to {
        left: 100%;
        top: 30%;
        transform: scaleX(-1);
      }
    }

    /* 配置提示 */
    .config-notice {
      background: rgba(255, 165, 0, 0.2);
      border: 2px solid orange;
      border-radius: 15px;
      padding: 20px;
      margin: 20px auto;
      max-width: 600px;
      text-align: center;
    }

    .config-notice h3 {
      color: orange;
      margin-bottom: 10px;
    }

    .config-notice p {
      color: #ccc;
      font-size: 0.9em;
      line-height: 1.6;
    }

    .config-notice code {
      background: rgba(0, 0, 0, 0.5);
      padding: 2px 6px;
      border-radius: 4px;
      color: #00ffff;
      font-family: monospace;
    }

    .config-notice ol {
      text-align: left;
      margin-top: 15px;
      padding-left: 20px;
    }

    .config-notice li {
      margin-bottom: 8px;
      color: #ddd;
    }

    .status-badge {
      display: inline-block;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.9em;
      font-weight: 700;
      margin-top: 10px;
    }

    .status-badge.connected {
      background: rgba(0, 255, 0, 0.2);
      border: 2px solid #00ff00;
      color: #00ff00;
    }

    .status-badge.disconnected {
      background: rgba(255, 0, 0, 0.2);
      border: 2px solid #ff0000;
      color: #ff0000;
    }

    /* Toast 提示 */
    .toast-container {
      position: fixed;
      top: 100px;
      right: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      min-width: 300px;
      padding: 15px 20px;
      border-radius: 10px;
      color: #fff;
      font-weight: 700;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideInRight 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .toast.success {
      background: linear-gradient(45deg, rgba(0, 255, 0, 0.8), rgba(0, 200, 0, 0.8));
      border: 2px solid #00ff00;
    }

    .toast.error {
      background: linear-gradient(45deg, rgba(255, 0, 0, 0.8), rgba(200, 0, 0, 0.8));
      border: 2px solid #ff0000;
    }

    .toast.info {
      background: linear-gradient(45deg, rgba(0, 255, 255, 0.8), rgba(0, 200, 255, 0.8));
      border: 2px solid #00ffff;
    }

    .toast i {
      font-size: 1.3em;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideOutRight {
      from {
        opacity: 1;
        transform: translateX(0);
      }
      to {
        opacity: 0;
        transform: translateX(100px);
      }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="logo">
      <i class="fas fa-feather-alt"></i>
      手养鹦鹉之家
    </div>
    <div class="nav-links">
      <button class="nav-btn active" onclick="showSection('home')">
        <i class="fas fa-home"></i> 首页
      </button>
      <button class="nav-btn" onclick="showSection('admin')">
        <i class="fas fa-cog"></i> 管理鹦鹉
      </button>
    </div>
  </nav>

  <!-- Toast 提示容器 -->
  <div class="toast-container" id="toast-container"></div>

  <!-- 主内容 -->
  <div class="main-content">
    <!-- 首页 -->
    <div id="home-section">
      <div class="hero">
        <h1>🦜 手养鹦鹉之家 🦜</h1>
        <p>每一只鹦鹉都是精心手养的宝贝，寻找温暖的新家</p>
      </div>

      <!-- 统计 -->
      <div class="stats-container">
        <div class="stat-card">
          <div class="number" id="total-parrots">0</div>
          <div class="label">鹦鹉总数</div>
        </div>
        <div class="stat-card">
          <div class="number" id="avg-days">0</div>
          <div class="label">平均手养天数</div>
        </div>
        <div class="stat-card">
          <div class="number" id="total-value">0</div>
          <div class="label">总价值 (元)</div>
        </div>
      </div>

      <!-- 鹦鹉展示 -->
      <div class="parrots-section">
        <h2 class="section-title">
          <i class="fas fa-crow"></i> 在家的鹦鹉宝贝们
        </h2>
        <div class="parrots-grid" id="parrots-grid">
          <div class="loading" style="grid-column: 1/-1;">
            <i class="fas fa-spinner"></i>
            <p>正在加载鹦鹉数据...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 管理面板 -->
    <div id="admin-section" class="admin-panel">
      <!-- Supabase 配置提示 -->
      <div id="config-notice" class="config-notice">
        <h3><i class="fas fa-exclamation-triangle"></i> 需要配置 Supabase</h3>
        <p>请在 <code>index.html</code> 中配置你的 Supabase 项目信息：</p>
        <ol>
          <li>打开 <code>index.html</code> 文件</li>
          <li>找到 <code>SUPABASE_URL</code> 和 <code>SUPABASE_ANON_KEY</code></li>
          <li>替换为你的项目配置</li>
        </ol>
        <p style="margin-top: 15px;">
          <strong>获取配置：</strong><br>
          Supabase Dashboard → Settings → API
        </p>
        <div id="connection-status" class="status-badge disconnected">
          <i class="fas fa-times-circle"></i> 未连接
        </div>
      </div>

      <!-- 登录界面 -->
      <div id="admin-login" style="display: none;">
        <h2 class="admin-title">
          <i class="fas fa-lock"></i> 管理员登录
        </h2>
        <div class="form-group">
          <label><i class="fas fa-key"></i> 输入密码</label>
          <input type="password" id="admin-password" placeholder="请输入管理员密码" onkeypress="if(event.key==='Enter') checkPassword()">
        </div>
        <button type="button" class="submit-btn" onclick="checkPassword()">
          <i class="fas fa-unlock"></i> 解锁管理面板
        </button>
        <p style="text-align: center; margin-top: 15px; color: #666; font-size: 0.9em;">
          <i class="fas fa-shield-alt"></i> 仅管理员可访问
        </p>
      </div>

      <!-- 管理表单（登录后显示） -->
      <div id="admin-form-container" style="display: none;">
        <div style="text-align: right; margin-bottom: 15px;">
          <button type="button" onclick="logout()" style="background: rgba(255,0,0,0.3); border: 2px solid #ff0000; padding: 8px 15px; border-radius: 10px; color: #fff; cursor: pointer;">
            <i class="fas fa-sign-out-alt"></i> 退出登录
          </button>
        </div>
        <h2 class="admin-title">
          <i class="fas fa-plus-circle"></i> 添加新鹦鹉
        </h2>
        <form id="parrot-form">
          <div class="form-group">
            <label><i class="fas fa-tag"></i> 鹦鹉名字</label>
            <input type="text" id="parrot-name" placeholder="例如：小绿、彩虹、豆豆" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label><i class="fas fa-money-bill"></i> 价格 (元)</label>
              <input type="number" id="parrot-price" placeholder="例如：1500" required>
            </div>
            <div class="form-group">
              <label><i class="fas fa-calendar"></i> 手养天数</label>
              <input type="number" id="parrot-days" placeholder="例如：45" required>
            </div>
          </div>

          <div class="form-group">
            <label><i class="fas fa-image"></i> 鹦鹉照片</label>
            <input type="file" id="parrot-image" accept="image/*" onchange="previewImage(this)">
            <div class="file-preview" id="image-preview"></div>
          </div>

          <div class="form-group">
            <label><i class="fas fa-video"></i> 鹦鹉视频 (可选)</label>
            <input type="file" id="parrot-video" accept="video/*">
          </div>

          <div class="form-group">
            <label><i class="fas fa-align-left"></i> 描述 (可选)</label>
            <textarea id="parrot-desc" rows="3" placeholder="介绍一下这只鹦鹉的特点..."></textarea>
          </div>

          <button type="submit" class="submit-btn" id="submit-btn">
            <i class="fas fa-save"></i> 保存鹦鹉信息
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>window.CACHE_BUST = Date.now();</script>

        const configNotice = document.getElementById('config-notice');
        if (configNotice) configNotice.style.display = 'none';
        
        const adminLogin = document.getElementById('admin-login');
        if (adminLogin) adminLogin.style.display = 'block';
        
        const connStatus = document.getElementById('connection-status');
        if (connStatus) {
          connStatus.className = 'status-badge connected';
          connStatus.innerHTML = '<i class="fas fa-check-circle"></i> 已连接';
        }
      } else {
        // 未配置时显示配置提示
        const adminLogin = document.getElementById('admin-login');
        if (adminLogin) adminLogin.style.display = 'none';
      }
    } catch (e) {
      console.error('Supabase 初始化失败:', e);
    }

    // 动态背景
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    for (let i = 0; i < 100; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 2 + 0.5,
        dx: (Math.random() - 0.5) * 0.3,
        dy: (Math.random() - 0.5) * 0.3,
        color: `hsl(${Math.random() * 60 + 160}, 100%, 50%)`
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
      });
      requestAnimationFrame(animate);
    }
    animate();

    // 添加飞翔的鹦鹉
    function addFlyingParrot() {
      const parrot = document.createElement('div');
      parrot.className = 'flying-parrot';
      parrot.textContent = '🦜';
      parrot.style.top = Math.random() * 30 + 10 + '%';
      document.body.appendChild(parrot);
      setTimeout(() => parrot.remove(), 15000);
    }
    setInterval(addFlyingParrot, 30000);

    // 鹦鹉数据管理
    let parrots = [];

    // 从 Supabase 加载数据
    async function loadParrots() {
      if (!isSupabaseConfigured) {
        document.getElementById('parrots-grid').innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <i class="fas fa-database"></i>
            <h3>Supabase 未配置</h3>
            <p>请按照 README.md 配置 Supabase 后刷新页面</p>
          </div>
        `;
        return;
      }

      // 加载数据
      const { data, error } = await sbClient
        .from('parrots')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error('加载数据失败:', error);
        document.getElementById('parrots-grid').innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <i class="fas fa-exclamation-circle"></i>
            <h3>加载失败</h3>
            <p>${error.message}</p>
            <p style="margin-top: 10px; color: #888;">请检查：</p>
            <ul style="text-align: left; max-width: 400px; margin: 10px auto; color: #aaa;">
              <li>1. Supabase 配置是否正确</li>
              <li>2. 是否创建了 parrots 表</li>
              <li>3. 表结构是否包含所需字段</li>
            </ul>
          </div>
        `;
        return;
      }

      parrots = data || [];
      renderParrots();
      updateStats();

      // 设置实时订阅
      setupRealtimeSubscription();
    }

    // 设置实时订阅 - 数据变化自动更新
    function setupRealtimeSubscription() {
      sbClient
        .channel('parrots-channel')
        .on('postgres_changes', 
          { 
            event: '*', 
            schema: 'public', 
            table: 'parrots' 
          }, 
          payload => {
            console.log('数据变化:', payload);
            loadParrots(); // 重新加载数据
          }
        )
        .subscribe();
    }

    // 保存数据到 Supabase
    async function saveParrotToSupabase(parrot) {
      if (!isSupabaseConfigured) {
        alert('Supabase 未配置，无法保存数据！');
        return false;
      }

      const { data, error } = await sbClient
        .from('parrots')
        .insert([parrot]);

      if (error) {
        console.error('保存失败:', error);
        alert('保存失败：' + error.message);
        return false;
      }

      return true;
    }

    // 删除鹦鹉
    async function deleteParrot(id) {
      const parrot = parrots.find(p => p.id === id);
      
      if (!confirm(`确定要删除 "${parrot?.name || '这只鹦鹉'}" 吗？\n此操作不可恢复！`)) return;

      if (!isSupabaseConfigured) {
        showToast('❌ Supabase 未配置，无法删除！', 'error');
        return;
      }

      const { error } = await sbClient
        .from('parrots')
        .delete()
        .eq('id', id);

      if (error) {
        console.error('删除失败:', error);
        showToast('❌ 删除失败：' + error.message, 'error');
      } else {
        // 从本地数组移除，实时更新画面
        parrots = parrots.filter(p => p.id !== id);
        renderParrots();
        updateStats();
        showToast('✅ 已成功删除！', 'success');
      }
    }

    // 渲染鹦鹉卡片
    function renderParrots() {
      const grid = document.getElementById('parrots-grid');
      if (parrots.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <i class="fas fa-dove"></i>
            <h3>还没有鹦鹉哦~</h3>
            <p>去管理面板添加第一只鹦鹉吧！</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = parrots.map(p => `
        <div class="parrot-card">
          <div class="days-badge">
            <i class="fas fa-clock"></i> ${p.days} 天
          </div>
          <button class="video-toggle" onclick="toggleVideo(this)">
            <i class="fas fa-play"></i>
          </button>
          <div class="parrot-image-container">
            <img src="${p.image}" alt="${p.name}" class="parrot-image">
            ${p.video ? `<video src="${p.video}" class="parrot-video" loop muted></video>` : ''}
          </div>
          <div class="parrot-info">
            <div class="parrot-name">
              <i class="fas fa-feather"></i> ${p.name}
            </div>
            <div class="parrot-details">
              <div class="detail-item">
                <div class="icon"><i class="fas fa-calendar-alt"></i></div>
                <div class="value">${p.days}</div>
                <div class="label">手养天数</div>
              </div>
              <div class="detail-item">
                <div class="icon"><i class="fas fa-heart"></i></div>
                <div class="value">${p.video ? '有视频' : '照片'}</div>
                <div class="label">媒体类型</div>
              </div>
            </div>
            ${p.description ? `<p style="color: #aaa; margin-bottom: 10px;">${p.description}</p>` : ''}
            <div class="parrot-price">${p.price}</div>
          </div>
          <button class="delete-btn" onclick="deleteParrot('${p.id}')">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      `).join('');
    }

    // 切换视频/图片
    function toggleVideo(btn) {
      const card = btn.closest('.parrot-card');
      const video = card.querySelector('.parrot-video');
      if (video) {
        card.classList.toggle('video-mode');
        if (card.classList.contains('video-mode')) {
          video.play();
        } else {
          video.pause();
        }
      }
    }

    // 更新统计
    function updateStats() {
      document.getElementById('total-parrots').textContent = parrots.length;
      
      if (parrots.length > 0) {
        const totalDays = parrots.reduce((sum, p) => sum + parseInt(p.days || 0), 0);
        const totalPrice = parrots.reduce((sum, p) => sum + parseInt(p.price || 0), 0);
        document.getElementById('avg-days').textContent = Math.round(totalDays / parrots.length);
        document.getElementById('total-value').textContent = totalPrice.toLocaleString();
      } else {
        document.getElementById('avg-days').textContent = '0';
        document.getElementById('total-value').textContent = '0';
      }
    }

    // 图片预览
    function previewImage(input) {
      const preview = document.getElementById('image-preview');
      preview.innerHTML = '';
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.createElement('img');
          img.src = e.target.result;
          preview.appendChild(img);
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    // 表单提交
    document.getElementById('parrot-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 保存中...';

      const name = document.getElementById('parrot-name').value;
      const price = document.getElementById('parrot-price').value;
      const days = document.getElementById('parrot-days').value;
      const desc = document.getElementById('parrot-desc').value;
      const imageFile = document.getElementById('parrot-image').files[0];
      const videoFile = document.getElementById('parrot-video').files[0];

      // 转换图片为 base64
      const imageToBase64 = (file) => {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.readAsDataURL(file);
        });
      };

      const imageData = imageFile ? await imageToBase64(imageFile) : 'https://picsum.photos/400/300?random=' + Date.now();
      
      let videoData = null;
      if (videoFile) {
        videoData = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.readAsDataURL(videoFile);
        });
      }

      const success = await saveParrotToSupabase({
        name,
        price: parseInt(price),
        days: parseInt(days),
        description: desc,
        image: imageData,
        video: videoData
      });

      if (success) {
        // 重置表单
        this.reset();
        document.getElementById('image-preview').innerHTML = '';
        showToast(`🎉 ${name} 已成功添加到云端！`, 'success');
        showSection('home');
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-save"></i> 保存鹦鹉信息';
    });

    // 管理员密码
    const ADMIN_PASSWORD = '1113407626';

    // 检查密码
    function checkPassword() {
      const input = document.getElementById('admin-password').value;
      if (input === ADMIN_PASSWORD) {
        document.getElementById('admin-login').style.display = 'none';
        document.getElementById('admin-form-container').style.display = 'block';
        sessionStorage.setItem('adminLoggedIn', 'true');
      } else {
        alert('❌ 密码错误！只有管理员可以访问。');
        document.getElementById('admin-password').value = '';
      }
    }

    // 退出登录
    function logout() {
      sessionStorage.removeItem('adminLoggedIn');
      document.getElementById('admin-login').style.display = 'block';
      document.getElementById('admin-form-container').style.display = 'none';
      document.getElementById('admin-password').value = '';
    }

    // 检查登录状态
    function checkLoginStatus() {
      if (sessionStorage.getItem('adminLoggedIn') === 'true') {
        document.getElementById('admin-login').style.display = 'none';
        document.getElementById('admin-form-container').style.display = 'block';
      }
    }

    // 切换页面
    function showSection(section) {
      const homeSection = document.getElementById('home-section');
      const adminSection = document.getElementById('admin-section');
      const navBtns = document.querySelectorAll('.nav-btn');

      if (section === 'home') {
        homeSection.style.display = 'block';
        adminSection.classList.remove('show');
        navBtns[0].classList.add('active');
        navBtns[1].classList.remove('active');
      } else {
        homeSection.style.display = 'none';
        adminSection.classList.add('show');
        navBtns[0].classList.remove('active');
        navBtns[1].classList.add('active');
        checkLoginStatus();
      }
    }

    // Toast 提示函数
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'info-circle';
      toast.innerHTML = `<i class="fas fa-${icon}"></i><span>${message}</span>`;
      
      container.appendChild(toast);
      
      // 3 秒后自动移除
      setTimeout(() => {
        toast.style.animation = 'slideOutRight 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // 初始化
    if (isSupabaseConfigured) {
      loadParrots();
    } else {
      updateStats();
    }

    // 窗口大小调整
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
